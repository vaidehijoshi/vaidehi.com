<!DOCTYPE html>

<html>
  <head>
    <title>Vaidehi Joshi</title>

    <link rel="stylesheet" type="text/css" href="style.css" />

    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌻</text></svg>">
    <meta name="viewport" content="width=device-width" />

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  </head>

  <body>
    <div id="heading-content">
      <img src="vaidehi-white.png" class="vaidehi-logo-image"/>
    </div>

    <div class="container">

      <section class="section">
        <div class="section-heading">writing</div>
        <ul id="writing-links"></ul>
      </section>

      <section class="section">
        <div class="section-heading">talks</div>

        <div class="talks-columns">
          <div class="talks-column">
            <div class="section-subheading">keynote &amp; leadership</div>
            <ul id="keynote-talks"></ul>
          </div>
          <div class="talks-column">
            <div class="section-subheading">technical</div>
            <ul id="technical-talks"></ul>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-heading">recommendations</div>
        <blockquote id="rec-quote"></blockquote>
        <p class="rec-source"><a href="https://www.linkedin.com/in/vaidehijoshi/" target="_blank">via LinkedIn</a></p>
      </section>

    </div>

    <script>
      function renderList(ulId, items) {
        const ul = document.getElementById(ulId);
        ul.innerHTML = items.map(function(item) {
          return '<li><a href="' + item.url + '" target="_blank">' + item.title + '</a></li>';
        }).join('');
      }

      fetch('data.yaml')
        .then(function(res) { return res.text(); })
        .then(function(text) {
          var data = jsyaml.load(text);

          renderList('keynote-talks', data.talks.keynote_and_leadership);
          renderList('technical-talks', data.talks.technical);
          renderList('writing-links', data.writing);

          var recs = data.recommendations;
          var rec = recs[Math.floor(Math.random() * recs.length)];
          var el = document.getElementById('rec-quote');
          var paragraphs = rec.text.split('\n').filter(function(p) { return p.trim(); });
          var body = paragraphs.map(function(p) { return '<p>' + p + '</p>'; }).join('');
          el.innerHTML = body + '<span class=”rec-author”>— ' + rec.author + '</span>';
        });
    </script>
  </body>

  <footer>
    <p>&copy; Vaidehi Joshi | 2026</p>
  </footer>
</html>
